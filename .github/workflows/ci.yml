name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Build and test matrix
  # Runs on PRs and pushes to main across OS's
  build-and-test:
    name: Build & Test (${{ matrix.config.name }} - ${{ matrix.build-configuration }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Windows gcc", os: windows-latest, cc: "gcc", cxx: "g++", qt-arch: "" }
          - { name: "Ubuntu gcc", os: ubuntu-latest, cc: "gcc", cxx: "g++", qt-arch: "gcc_64" }
          - { name: "MacOS clang", os: macos-latest, cc: "clang", cxx: "clang++", qt-arch: "clang_64" }
        build-configuration: [ Debug, Release ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            brew install ninja
          fi


      - name: Install Qt (Linux/macOS)
        if: runner.os != 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          target: 'desktop'
          arch: ${{ matrix.config.qt-arch }}

      - name: Verify Qt tool dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          ldd "$QT_ROOT_DIR/libexec/qmlimportscanner"
          ! ldd "$QT_ROOT_DIR/libexec/qmlimportscanner" | grep "not found"

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-configuration }} -DCMAKE_C_COMPILER=${{ matrix.config.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-configuration }} -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_PREFIX_PATH=/mingw64

      - name: Build Project (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config ${{ matrix.build-configuration }}

      - name: Build Project (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config ${{ matrix.build-configuration }}

      - name: Run Catch2 Unit Tests (Linux/macOS)
        if: runner.os != 'Windows'
        # Runs the unit tests you specified
        run: ctest --test-dir build -C ${{ matrix.build-configuration }} --output-on-failure

      - name: Run Catch2 Unit Tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ctest --test-dir build -C ${{ matrix.build-configuration }} --output-on-failure

      # We only package and upload 'Release' builds to save storage and time
      - name: Compress Release Build Directory
        if: matrix.build-configuration == 'Release'
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          path: 'build'
          filename: '${{ matrix.config.os }}-build.zip'

      - name: Upload Artifacts for Release
        if: matrix.build-configuration == 'Release'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config.os }}-build
          path: ${{ matrix.config.os }}-build.zip
          retention-days: 1


  # JOB 2: Create Pre-Release
  # Runs only on pushes to main, after tests pass
  release:
    name: Create Pre-Release
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download all OS Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-artifacts
          merge-multiple: true # Puts the Mac, Win, and Linux zip files in the same folder

      - name: Generate Tag & Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create naming convention
          DATE=$(date +'%d_%m_%Y')
          SHORT_SHA=${GITHUB_SHA::8}
          TAG_NAME="dev-${SHORT_SHA}-${DATE}"
          
          # Create Pre-Release and attach all downloaded .zip files using modern GitHub CLI
          gh release create "$TAG_NAME" ./release-artifacts/*.zip \
            --title "Development Build $TAG_NAME" \
            --prerelease \
            --generate-notes
