name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  BUILD_DIR: build
  QT_VERSION: "6.5.3"

jobs:
  build-and-test:
    name: ${{ matrix.config.name }} (${{ matrix.build_configuration }})
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows gcc
            os: windows-latest
            cc: gcc
            cxx: g++
            shell: "msys2 {0}"
            qt_arch: ""
            extra_cmake_args: ""
          - name: Ubuntu gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            shell: bash
            qt_arch: gcc_64
            extra_cmake_args: ""
          - name: MacOS clang
            os: macos-latest
            cc: clang
            cxx: clang++
            shell: bash
            qt_arch: clang_64
            extra_cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
        build_configuration: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Ninja (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y ninja-build
              ;;
            macOS)
              command -v ninja >/dev/null 2>&1 || brew install ninja
              ;;
          esac

      - name: Install Qt (Linux/macOS)
        if: runner.os != 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: ${{ matrix.config.qt_arch }}
          archives: qtbase qtdeclarative

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-declarative

      - name: Configure CMake
        shell: ${{ matrix.config.shell }}
        run: |
          qt_prefix="$QT_ROOT_DIR"
          if [ "${{ runner.os }}" = "Windows" ]; then
            qt_prefix=/mingw64
          fi

          cmake -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_configuration }} \
            -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} \
            -DCMAKE_PREFIX_PATH="$qt_prefix" \
            ${{ matrix.config.extra_cmake_args }}

      - name: Build project
        shell: ${{ matrix.config.shell }}
        run: cmake --build "$BUILD_DIR" --config ${{ matrix.build_configuration }}

      - name: Run Catch2 unit tests
        shell: ${{ matrix.config.shell }}
        run: ctest --test-dir "$BUILD_DIR" -C ${{ matrix.build_configuration }} --output-on-failure

      - name: Compress release build directory
        if: matrix.build_configuration == 'Release'
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: zip
          path: ${{ env.BUILD_DIR }}
          filename: ${{ matrix.config.os }}-build.zip

      - name: Upload release artifact
        if: matrix.build_configuration == 'Release'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config.os }}-build
          path: ${{ matrix.config.os }}-build.zip
          retention-days: 1

  release:
    name: Create pre-release
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: Generate tag and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%d_%m_%Y')
          SHORT_SHA=${GITHUB_SHA::8}
          TAG_NAME="dev-${SHORT_SHA}-${DATE}"

          gh release create "$TAG_NAME" ./release-artifacts/*.zip \
            --title "Development Build $TAG_NAME" \
            --prerelease \
            --generate-notes
